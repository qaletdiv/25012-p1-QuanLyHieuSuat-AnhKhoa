<!DOCTYPE html>
<html lang="vi" data-theme="light">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Kanban Desk – Taskora Style</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="assets/css/style.css" />
  <link rel="stylesheet" href="assets/css/button.css" />
</head>
<body>
  <div class="app">
    <!-- SIDEBAR -->
    <aside class="sidebar">
      <div class="brand"><div class="logo">O</div><strong>Oshima</strong></div>
      <nav class="nav">
        <a class="active" href="#">Quản lý công việc</a>
        
      </nav>
      <div class="sep"></div>
      
    </aside>

    <!-- MAIN -->
    <main class="main">
      <div class="toolbar">
        <div class="filters">
          <label class="ip"><input id="q-task" placeholder="Tìm task..."/></label>
          <label class="ip"><input placeholder="Tìm trạng thái…"/></label>
          <label class="ip"><input placeholder="Chọn Loại Nhiệm Vụ…"/></label>
          <label class="ip"><button class="btn" id="btn-refresh">Cập nhật</button><button class="btn" id="btn-clear" style="margin-left:6px">Xoá lọc</button></label>
          <label class="ip"><input type="date" class="field" id="from_picker"></label>
          <label class="ip"><input placeholder="Chọn Dự Án…"/></label>
        </div>
      </div>

      <!-- KANBAN -->
      <section class="kanban" id="kanban"></section>
    </main>
  </div>

  <!-- Dialog: Chi tiết -->
  <dialog id="detailDlg">
    <div class="dlg">Chi tiết Task</div>
    <div class="dlg-body" id="detailBody"></div>
    <div class="dlg-act">
      <button class="btn" id="dDelete">Xoá</button>
      <button class="btn primary" id="dEdit">Sửa</button>
      <form method="dialog" style="display:inline"><button class="btn" value="cancel">Đóng</button></form>
    </div>
  </dialog>

  <!-- Dialog: Thêm/Sửa -->
  <dialog id="taskDlg">
    <div class="dlg">Thêm/Cập nhật Task</div>
    <form method="dialog" class="dlg-body" id="taskForm">
      <input type="hidden" id="taskId" />
      <div class="dlg-row">
        <label>Tiêu đề</label>
        <input id="taskTitle" class="field field-lg" required />
      </div>
      <div class="dlg-row">
        <label>Mức ưu tiên</label>
        <select id="taskPriority" class="field field-lg">
          <option value="high">High</option>
          <option value="medium">Medium</option>
          <option value="low">Low</option>
        </select>
      </div>
      <div class="dlg-row">
        <label>Ghi chú</label>
        <textarea id="taskNote" rows="3" class="field field-lg" placeholder="Mô tả ngắn…"></textarea>
      </div>
      <div class="dlg-row">
        <label>Thẻ (tag)</label>
        <input id="taskTag" class="field field-lg" placeholder="VD: 2/5, 0/1, Design…" />
      </div>
      <div class="dlg-act">
        <button class="btn" value="cancel">Huỷ</button>
        <button class="btn primary" id="btnSaveTask" value="default">Lưu</button>
      </div>
    </form>
  </dialog>

  <script src="assets/lib/jquery.min.js"></script>
  <script src="assets/data/mock-data.js"></script>
  <script src="assets/js/index.js"></script>
</body>
</html>
